<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insights — Anoma Holdings Limited</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #0f1f3d; --navy-light: #1a3260; --gold: #b8965a;
      --gold-light: #d4af7a; --off-white: #f8f6f1; --text-dark: #1c1c1c;
      --text-mid: #5a5a5a; --text-light: #8a8a8a; --border: rgba(15,31,61,0.12);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--off-white); color: var(--text-dark); }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 4rem; background: var(--off-white); border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 1.35rem; letter-spacing: 0.04em; color: var(--navy); text-decoration: none; }
    .logo span { color: var(--gold); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-mid); text-decoration: none; }
    .nav-links a:hover { color: var(--navy); }
    .nav-links a.active { color: var(--navy); border-bottom: 1px solid var(--gold); padding-bottom: 2px; }
    .page-header { padding: 4rem 4rem 3rem; border-bottom: 0.5px solid var(--border); }
    .page-eyebrow { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 3rem; color: var(--navy); }
    .posts-grid { padding: 4rem; max-width: 900px; }
    .post-item { padding: 2.5rem 0; border-bottom: 0.5px solid var(--border); }
    .post-item:first-child { padding-top: 0; }
    .post-date { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-light); margin-bottom: 0.75rem; }
    .post-title { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 400; color: var(--navy); margin-bottom: 0.75rem; line-height: 1.2; }
    .post-title a { text-decoration: none; color: inherit; }
    .post-title a:hover { color: var(--gold); }
    .post-summary { font-size: 0.9rem; line-height: 1.85; color: var(--text-mid); max-width: 600px; margin-bottom: 1.25rem; }
    .read-more { font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); text-decoration: none; }
    .read-more:hover { color: var(--navy); }
    .no-posts { padding: 4rem; color: var(--text-light); font-size: 0.95rem; }
    footer { padding: 2.5rem 4rem; border-top: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--off-white); margin-top: 4rem; }
    .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--navy); font-weight: 300; }
    .footer-copy { font-size: 0.75rem; color: var(--text-light); }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a { font-size: 0.75rem; color: var(--text-light); text-decoration: none; }
    @media (max-width: 768px) {
      nav { padding: 1.25rem 1.5rem; } .nav-links { display: none; }
      .page-header { padding: 2.5rem 1.5rem; } .posts-grid { padding: 2rem 1.5rem; }
      footer { flex-direction: column; gap: 1rem; text-align: center; padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">ANOMA <span>HOLDINGS</span> LIMITED</a>
  <ul class="nav-links">
    <li><a href="/#philosophy">Philosophy</a></li>
    <li><a href="/#portfolio">Portfolio</a></li>
    <li><a href="/blog.html" class="active">Insights</a></li>
    <li><a href="/#contact">Contact</a></li>
  </ul>
</nav>

<div class="page-header">
  <p class="page-eyebrow">From Anoma Holdings</p>
  <h1 class="page-title">Insights</h1>
</div>

<div class="posts-grid" id="posts-container">
  <p class="no-posts">No articles published yet. Check back soon.</p>
</div>

<footer>
  <div class="footer-logo">Anoma Holdings Limited</div>
  <div class="footer-copy">&copy; 2026 Anoma Holdings Limited. All rights reserved.</div>
  <div class="footer-links">
    <a href="#">Privacy policy</a>
    <a href="/#contact">Contact</a>
  </div>
</footer>

<script src="https://unpkg.com/marked@9.1.6/marked.min.js"></script>
<script>
  async function loadPosts() {
    try {
      const apiRes = await fetch('https://api.github.com/repos/AndrewLywn/anoma-holdings-website/contents/_posts');
      if (!apiRes.ok) return;
      const files = await apiRes.json();
      if (!files || files.length === 0) return;

      const posts = await Promise.all(files.filter(f => f.name.endsWith('.md')).map(async file => {
        const res = await fetch(file.download_url);
        const text = await res.text();
        const fmMatch = text.match(/^---\n([\s\S]*?)\n---/);
        if (!fmMatch) return null;
        const fm = {};
        fmMatch[1].split('\n').forEach(line => {
          const [k, ...v] = line.split(':');
          if (k) fm[k.trim()] = v.join(':').trim().replace(/^"|"$/g, '');
        });
        return { slug: file.name.replace('.md',''), ...fm };
      }));

      const valid = posts.filter(Boolean).sort((a, b) => new Date(b.date) - new Date(a.date));
      if (valid.length === 0) return;

      const container = document.getElementById('posts-container');
      container.innerHTML = valid.map(post => {
        const date = post.date ? new Date(post.date).toLocaleDateString('en-NZ', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
        return `
          <div class="post-item">
            <p class="post-date">${date}</p>
            <h2 class="post-title"><a href="/post.html?slug=${post.slug}">${post.title || 'Untitled'}</a></h2>
            <p class="post-summary">${post.summary || ''}</p>
            <a class="read-more" href="/post.html?slug=${post.slug}">Read article &rarr;</a>
          </div>`;
      }).join('');
    } catch(e) { console.log(e); }
  }
  loadPosts();

  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) { window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; }); }
    });
  }
</script>
</body>
</html>
